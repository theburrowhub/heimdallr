# Override for local testing.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up
services:
  heimdallr:
    container_name: heimdallr-test
    restart: "no"
    ports:
      - "${HEIMDALLR_PORT:-7842}:${HEIMDALLR_PORT:-7842}"
    environment:
      - HEIMDALLR_POLL_INTERVAL=${HEIMDALLR_POLL_INTERVAL:-1m}
    volumes:
      - heimdallr-test-data:/data
      - ./config:/config
      # Gemini OAuth tokens from host (uncomment for Level 3 E2E test):
      # - ~/.gemini:/home/heimdallr/.gemini:ro

volumes:
  heimdallr-test-data:
    driver: local
