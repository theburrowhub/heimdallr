# Heimdallm configuration
# This file is optional — all values can be set via environment variables.
# Environment variables take precedence over values in this file.

[server]
port = 7842
bind_addr = "0.0.0.0"

[github]
poll_interval = "5m"
repositories = ["org/repo1", "org/repo2"]

# Topic-based auto-discovery (optional).
# When discovery_topic is set, any repo inside discovery_orgs that carries the
# topic is automatically monitored alongside the static list above. The merged
# list is refreshed every discovery_interval. See:
# https://docs.github.com/repositories/classifying-your-repository-with-topics
# discovery_topic    = "heimdallm-review"
# discovery_orgs     = ["your-org", "your-other-org"]   # required when discovery_topic is set
# discovery_interval = "15m"                             # any Go duration; defaults to 15m

# Base directories for auto-resolving local_dir per repo (list).
# Each {base}/{repo-name} is checked in order. Supports multiple workspace groups.
# local_dir_base = ["/repos/ai-platform-workspace/workspace", "/repos"]

# Issue tracking pipeline (fase-2).
# When enabled, the daemon fetches open issues from the monitored repos,
# classifies them by label, and — depending on the mode — posts an AI
# review comment (review_only) or opens an implementation PR
# (auto_implement). Label classification precedence:
#
#   skip_labels  >  review_only_labels  >  develop_labels  >  default_action
#
# [github.issue_tracking]
# enabled             = false
# filter_mode         = "exclusive"              # "exclusive" (AND) | "inclusive" (OR)
# default_action      = "ignore"                 # "ignore" | "review_only"
# organizations       = ["your-org"]             # empty = any org in repositories
# assignees           = ["your-username"]        # empty = any assignee (or unassigned)
# develop_labels      = ["enhancement", "feature", "bug"]
# review_only_labels  = ["question", "discussion", "analysis"]
# skip_labels         = ["wontfix", "duplicate", "invalid"]

[ai]
# Available: claude, gemini, codex, opencode
primary = "claude"
# fallback = "gemini"
review_mode = "single"   # "single" or "multi"
# execution_timeout = "20m"   # default: 5m; increase for complex auto_implement

# Per-CLI settings (optional)
# [ai.agents.claude]
# model = "claude-sonnet-4-20250514"
# max_turns = 0
# effort = "high"
# permission_mode = "auto"
# bare = true                    # WARNING: bare mode disables OAuth authentication.
#                                # Use only with ANTHROPIC_API_KEY, not CLAUDE_CODE_OAUTH_TOKEN.
# dangerously_skip_perms = true
# no_session_persistence = true

# [ai.agents.gemini]
# model = "gemini-2.5-pro"

# [ai.agents.codex]
# model = "codex-mini"
# approval_mode = "full-auto"

# [ai.agents.opencode]
# model = "anthropic/claude-sonnet-4"

# Global PR creation metadata defaults (used by auto_implement when per-repo is not set)
# [ai.pr_metadata]
# reviewers = ["muriano", "ivanmunozruiz"]
# labels = ["auto-generated", "heimdallm"]

# Per-repo AI overrides (optional)
# [ai.repos."org/repo1"]
# primary = "codex"
# review_mode = "multi"
# local_dir = "/repos/repo1"    # mount from host via docker-compose volumes
# prompt          = "pr-review-agent-id"    # Agent profile for PR reviews
# issue_prompt    = "issue-triage-agent-id" # Agent profile for issue triage
# implement_prompt = "impl-agent-id"        # Agent profile for auto_implement code-generation prompt
# pr_reviewers = ["reviewer1"]  # override global for this repo
# pr_assignee = "assignee1"
# pr_labels = ["team-x"]
# pr_draft = false

[retention]
max_days = 90
