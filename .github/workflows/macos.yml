name: macOS Build & Release

on:
  push:
    branches: [ci]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Heimdallr.dmg
    runs-on: macos-14          # Apple Silicon (arm64)

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchains ─────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: flutter_app/macos
        run: pod install --repo-update

      # ── Build daemon ───────────────────────────────────────────────────────
      - name: Build daemon (arm64)
        run: make build-daemon

      - name: Run daemon tests
        working-directory: daemon
        run: go test ./... -timeout 60s

      # ── Build Flutter app ──────────────────────────────────────────────────
      - name: Run Flutter tests
        working-directory: flutter_app
        run: flutter test

      - name: Build Flutter macOS (release)
        working-directory: flutter_app
        run: flutter build macos --release

      # ── Bundle daemon into .app ────────────────────────────────────────────
      - name: Embed daemon inside .app bundle
        run: |
          APP="flutter_app/build/macos/Build/Products/Release/Heimdallr.app"
          DAEMON_BIN="daemon/bin/heimdallr"

          echo "Embedding daemon into $APP"
          cp "$DAEMON_BIN" "$APP/Contents/MacOS/heimdallr"
          chmod +x "$APP/Contents/MacOS/heimdallr"

          echo "Bundle contents:"
          ls -lh "$APP/Contents/MacOS/"

      # ── Ad-hoc code sign ───────────────────────────────────────────────────
      # For distribution, replace '-' with a Developer ID certificate.
      - name: Ad-hoc codesign
        run: |
          APP="flutter_app/build/macos/Build/Products/Release/Heimdallr.app"
          codesign --force --deep --sign - "$APP"
          echo "Codesign status:"
          codesign --verify --verbose "$APP"

      # ── Package as DMG ─────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          APP="flutter_app/build/macos/Build/Products/Release/Heimdallr.app"
          mkdir -p dist

          # Compute version: use git tag if present, otherwise short SHA
          VERSION="${GITHUB_REF_NAME:-$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')}"
          DMG="dist/Heimdallr-${VERSION}.dmg"

          echo "Creating $DMG from $APP"

          # Use hdiutil (built-in, no extra deps required)
          hdiutil create \
            -volname "Heimdallr" \
            -srcfolder "$APP" \
            -ov \
            -format UDZO \
            "$DMG"

          echo "DMG created:"
          ls -lh "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          echo "DMG_NAME=$(basename $DMG)" >> "$GITHUB_ENV"

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}
          retention-days: 30

      # ── Publish GitHub Release (tags only) ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Heimdallr ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ env.DMG_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
