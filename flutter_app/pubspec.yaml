name: heimdallr
description: GitHub PR Auto-Review Desktop App
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  http: ^1.2.0
  go_router: ^14.0.0
  shared_preferences: ^2.2.0
  json_annotation: ^4.8.0
  tray_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.0
  build_runner: ^2.4.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/tray_icon.png
