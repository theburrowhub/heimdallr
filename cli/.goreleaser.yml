version: 2

project_name: heimdallm-cli

builds:
  - main: ./cmd/heimdallm-cli
    binary: heimdallm-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: theburrowhub
      name: homebrew-tap
    homepage: https://github.com/theburrowhub/heimdallm
    description: "CLI client for Heimdallm — monitor PRs, issues, and activity from the terminal"
    license: MIT
    install: |
      bin.install "heimdallm-cli"
    test: |
      system "#{bin}/heimdallm-cli", "--help"

release:
  github:
    owner: theburrowhub
    name: heimdallm
  mode: keep-existing
  extra_files: []
