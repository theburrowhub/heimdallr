name: heimdallm
description: GitHub PR Auto-Review Desktop App
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  http: ^1.2.0
  go_router: ^14.0.0
  shared_preferences: ^2.2.0
  json_annotation: ^4.8.0
  tray_manager: ^0.5.2
  window_manager: ^0.5.1
  local_notifier: ^0.1.6
  url_launcher: ^6.3.2
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.0
  build_runner: ^2.4.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon.png"
  macos:
    generate: true
    image_path: "assets/icon.png"
  linux:
    generate: true
    image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/tray_icon.png
    - assets/tray_icon@2x.png
