services:
  heimdallm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: heimdallm
    restart: unless-stopped
    ports:
      - "${HEIMDALLM_PORT:-7842}:${HEIMDALLM_PORT:-7842}"
    environment:
      # ── Heimdallm config ───────────────────────────────────────────────
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - HEIMDALLM_AI_PRIMARY=${HEIMDALLM_AI_PRIMARY:-claude}
      - HEIMDALLM_AI_FALLBACK=${HEIMDALLM_AI_FALLBACK:-}
      - HEIMDALLM_REPOSITORIES=${HEIMDALLM_REPOSITORIES:-}
      - HEIMDALLM_POLL_INTERVAL=${HEIMDALLM_POLL_INTERVAL:-5m}
      - HEIMDALLM_REVIEW_MODE=${HEIMDALLM_REVIEW_MODE:-single}
      - HEIMDALLM_RETENTION_DAYS=${HEIMDALLM_RETENTION_DAYS:-90}
      - HEIMDALLM_PORT=${HEIMDALLM_PORT:-7842}
      - HEIMDALLM_BIND_ADDR=0.0.0.0

      # ── Issue tracking pipeline ────────────────────────────────────────
      # All optional. The daemon's applyIssueTrackingEnv reads these at
      # startup; without forwarding them here the operator's docker/.env
      # values stay outside the container and silently get defaults.
      - HEIMDALLM_ISSUE_TRACKING_ENABLED=${HEIMDALLM_ISSUE_TRACKING_ENABLED:-}
      - HEIMDALLM_ISSUE_FILTER_MODE=${HEIMDALLM_ISSUE_FILTER_MODE:-}
      - HEIMDALLM_ISSUE_DEFAULT_ACTION=${HEIMDALLM_ISSUE_DEFAULT_ACTION:-}
      - HEIMDALLM_ISSUE_ORGANIZATIONS=${HEIMDALLM_ISSUE_ORGANIZATIONS:-}
      - HEIMDALLM_ISSUE_ASSIGNEES=${HEIMDALLM_ISSUE_ASSIGNEES:-}
      - HEIMDALLM_ISSUE_DEVELOP_LABELS=${HEIMDALLM_ISSUE_DEVELOP_LABELS:-}
      - HEIMDALLM_ISSUE_REVIEW_ONLY_LABELS=${HEIMDALLM_ISSUE_REVIEW_ONLY_LABELS:-}
      - HEIMDALLM_ISSUE_SKIP_LABELS=${HEIMDALLM_ISSUE_SKIP_LABELS:-}
      - HEIMDALLM_ISSUE_BLOCKED_LABELS=${HEIMDALLM_ISSUE_BLOCKED_LABELS:-}
      - HEIMDALLM_ISSUE_PROMOTE_TO_LABEL=${HEIMDALLM_ISSUE_PROMOTE_TO_LABEL:-}

      # ── Topic-based repository discovery ───────────────────────────────
      - HEIMDALLM_DISCOVERY_TOPIC=${HEIMDALLM_DISCOVERY_TOPIC:-}
      - HEIMDALLM_DISCOVERY_ORGS=${HEIMDALLM_DISCOVERY_ORGS:-}
      - HEIMDALLM_DISCOVERY_INTERVAL=${HEIMDALLM_DISCOVERY_INTERVAL:-}

      # ── AI CLI authentication ──────────────────────────────────────────
      # Claude Code CLI (Anthropic)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}

      # Codex CLI (OpenAI)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}

      # Gemini CLI (Google)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # OpenCode CLI (uses any provider key above, or OpenRouter)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # ── Headless / non-interactive mode ────────────────────────────────
      - CI=true
      - OPENCODE_DISABLE_AUTOUPDATE=true
    volumes:
      # Persistent data (SQLite DB + API token)
      - heimdallm-data:/data
      # Configuration. Named volume (not a bind mount) so the daemon user
      # inside the container owns the directory and can persist the
      # generated config.toml on first boot. A `./config:/config` bind
      # mount inherits the host directory's ownership (root, since Docker
      # creates it on demand), which blocked writeConfigTOML and made
      # POST /reload return 500 whenever config.toml was missing. The
      # image already declares VOLUME ["/config"] and chowns the path to
      # heimdallm:heimdallm during build.
      #
      # Migration (pre-v0.1.8 -> this): if you had a customised
      # docker/config/config.toml under the old bind mount, copy it into
      # the new named volume BEFORE your first `docker compose up` with
      # this version, otherwise the daemon will regenerate from env vars
      # and your manual edits are lost silently:
      #
      #   docker compose up --no-start heimdallm     # create container
      #   docker cp docker/config/config.toml heimdallm:/config/config.toml
      #   docker compose up -d                        # start with the file in place
      #
      # Env-driven setups (HEIMDALLM_* in docker/.env) and saves you made
      # via the web UI Configuration screen are unaffected; both flow
      # through the store layer and survive the volume swap.
      - heimdallm-config:/config
      #
      # Gemini OAuth tokens from host (if using browser-based auth):
      # - ~/.gemini:/home/heimdallm/.gemini:ro
      #
      # Local repos for full-repo analysis (optional):
      # - /path/to/repos:/repos:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7842/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Flutter Web served by Nginx with server-side token injection.
  # Swap-in for the SvelteKit web_ui container we used to build here:
  # same host port, same token-from-shared-volume flow, same depends_on.
  # The Nginx entrypoint reads the daemon's API token from /data/api_token
  # (shared read-only volume) or HEIMDALLM_API_TOKEN env var and injects
  # it into proxied /api/* requests so the browser never handles it.
  web:
    build:
      context: ../flutter_app
      dockerfile: Dockerfile.web
    container_name: heimdallm-web
    restart: unless-stopped
    ports:
      - "${HEIMDALLM_WEB_PORT:-3000}:3000"
    environment:
      # Upstream daemon URL inside the compose network. Host + port line
      # up with the heimdallm service above.
      - DAEMON_URL=http://heimdallm:${HEIMDALLM_PORT:-7842}
      # Optional: skip the token file by setting HEIMDALLM_API_TOKEN.
      # Left empty in the common case — the entrypoint reads
      # /data/api_token from the shared volume below.
      - HEIMDALLM_API_TOKEN=${HEIMDALLM_API_TOKEN:-}
    volumes:
      # Read-only mount so Nginx can load /data/api_token but cannot
      # mutate the daemon's SQLite DB or config.
      - heimdallm-data:/data:ro
    depends_on:
      heimdallm:
        # Wait until the daemon is healthy so the token file exists and
        # the first UI request doesn't race a still-initialising daemon.
        condition: service_healthy
    healthcheck:
      # nginx:alpine ships wget via busybox — no extra packages needed.
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  heimdallm-data:
    driver: local
  heimdallm-config:
    driver: local
