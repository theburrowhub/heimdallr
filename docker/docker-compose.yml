services:
  heimdallm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: heimdallm
    restart: unless-stopped
    ports:
      - "${HEIMDALLM_PORT:-7842}:${HEIMDALLM_PORT:-7842}"
    environment:
      # ── Heimdallm config ───────────────────────────────────────────────
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - HEIMDALLM_AI_PRIMARY=${HEIMDALLM_AI_PRIMARY:-claude}
      - HEIMDALLM_AI_FALLBACK=${HEIMDALLM_AI_FALLBACK:-}
      - HEIMDALLM_REPOSITORIES=${HEIMDALLM_REPOSITORIES:-}
      - HEIMDALLM_POLL_INTERVAL=${HEIMDALLM_POLL_INTERVAL:-5m}
      - HEIMDALLM_REVIEW_MODE=${HEIMDALLM_REVIEW_MODE:-single}
      - HEIMDALLM_RETENTION_DAYS=${HEIMDALLM_RETENTION_DAYS:-90}
      - HEIMDALLM_PORT=${HEIMDALLM_PORT:-7842}
      - HEIMDALLM_BIND_ADDR=0.0.0.0

      # ── Issue tracking pipeline ────────────────────────────────────────
      # All optional. The daemon's applyIssueTrackingEnv reads these at
      # startup; without forwarding them here the operator's docker/.env
      # values stay outside the container and silently get defaults.
      - HEIMDALLM_ISSUE_TRACKING_ENABLED=${HEIMDALLM_ISSUE_TRACKING_ENABLED:-}
      - HEIMDALLM_ISSUE_FILTER_MODE=${HEIMDALLM_ISSUE_FILTER_MODE:-}
      - HEIMDALLM_ISSUE_DEFAULT_ACTION=${HEIMDALLM_ISSUE_DEFAULT_ACTION:-}
      - HEIMDALLM_ISSUE_ORGANIZATIONS=${HEIMDALLM_ISSUE_ORGANIZATIONS:-}
      - HEIMDALLM_ISSUE_ASSIGNEES=${HEIMDALLM_ISSUE_ASSIGNEES:-}
      - HEIMDALLM_ISSUE_DEVELOP_LABELS=${HEIMDALLM_ISSUE_DEVELOP_LABELS:-}
      - HEIMDALLM_ISSUE_REVIEW_ONLY_LABELS=${HEIMDALLM_ISSUE_REVIEW_ONLY_LABELS:-}
      - HEIMDALLM_ISSUE_SKIP_LABELS=${HEIMDALLM_ISSUE_SKIP_LABELS:-}
      - HEIMDALLM_ISSUE_BLOCKED_LABELS=${HEIMDALLM_ISSUE_BLOCKED_LABELS:-}
      - HEIMDALLM_ISSUE_PROMOTE_TO_LABEL=${HEIMDALLM_ISSUE_PROMOTE_TO_LABEL:-}

      # ── Topic-based repository discovery ───────────────────────────────
      - HEIMDALLM_DISCOVERY_TOPIC=${HEIMDALLM_DISCOVERY_TOPIC:-}
      - HEIMDALLM_DISCOVERY_ORGS=${HEIMDALLM_DISCOVERY_ORGS:-}
      - HEIMDALLM_DISCOVERY_INTERVAL=${HEIMDALLM_DISCOVERY_INTERVAL:-}

      # ── AI CLI authentication ──────────────────────────────────────────
      # Claude Code CLI (Anthropic)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}

      # Codex CLI (OpenAI)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}

      # Gemini CLI (Google)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # OpenCode CLI (uses any provider key above, or OpenRouter)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # ── Headless / non-interactive mode ────────────────────────────────
      - CI=true
      - OPENCODE_DISABLE_AUTOUPDATE=true
    volumes:
      # Persistent data (SQLite DB + API token)
      - heimdallm-data:/data
      # Configuration (optional — env vars work without this)
      - ./config:/config
      #
      # Gemini OAuth tokens from host (if using browser-based auth):
      # - ~/.gemini:/home/heimdallm/.gemini:ro
      #
      # Local repos for full-repo analysis (optional):
      # - /path/to/repos:/repos:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7842/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # SvelteKit web UI. Talks to the daemon over its HTTP API; reads the
  # per-daemon API token from the shared heimdallm-data volume so operators
  # don't have to copy it into the environment by hand. `make setup`
  # provides a fallback path that writes the token into docker/.env.
  #
  # This service starts alongside the daemon by default (matches the
  # acceptance criterion of #33: "`docker compose up` levanta daemon + web
  # sin config manual de token"). If you want the pre-#33 behaviour
  # (daemon only) name the service explicitly:
  #     docker compose up -d heimdallm
  # A `profiles: ["web"]` key was considered but rejected — it would turn
  # the default command into a no-op for the web UI and break the AC.
  web:
    build:
      # The web_ui Dockerfile assumes the build context is rooted at web_ui/
      # (it does `COPY package.json ./` without any prefix). Point compose at
      # that directory so the build matches the Dockerfile's expectations.
      context: ../web_ui
      dockerfile: Dockerfile
    container_name: heimdallm-web
    restart: unless-stopped
    ports:
      - "${HEIMDALLM_WEB_PORT:-3000}:3000"
    environment:
      # Where the daemon lives inside the compose network. Host + port line
      # up with the heimdallm service above.
      - HEIMDALLM_API_URL=http://heimdallm:${HEIMDALLM_PORT:-7842}
      # Optional: set HEIMDALLM_API_TOKEN to skip reading the token from
      # the shared volume. Left empty on purpose in the example.
      - HEIMDALLM_API_TOKEN=${HEIMDALLM_API_TOKEN:-}
    volumes:
      # Read-only mount so the web container can load /data/api_token but
      # cannot mutate the daemon's SQLite DB or config.
      - heimdallm-data:/data:ro
    depends_on:
      heimdallm:
        # Wait until the daemon is healthy so the first UI request does
        # not race a still-initialising daemon and render a 502.
        condition: service_healthy
    healthcheck:
      # node:22-alpine does not ship curl or wget, but it does have node.
      # A tiny http GET is enough to confirm the SvelteKit server responds
      # without pulling an extra package into the image.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  heimdallm-data:
    driver: local
