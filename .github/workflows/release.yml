name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build assets for (e.g. v0.6.0)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Opt-in to Node.js 24 for all JavaScript actions (Node 20 deprecated Sep 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker image — pushed to GitHub Container Registry
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build-push:
    needs: release-please
    if: >-
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      TAG: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || needs.release-please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            ${{ github.event_name != 'workflow_dispatch' && 'type=raw,value=latest' || '' }}
            type=semver,pattern={{version}},value=${{ env.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG }}
            type=semver,pattern={{major}},value=${{ env.TAG }}
            type=sha,prefix=

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ═══════════════════════════════════════════════════════════════════════════
  # Linux packages — .deb, .rpm, .AppImage
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux packages (.deb / .rpm / .AppImage)
    needs: release-please
    if: >-
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      # ── Toolchains ──────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── System dependencies (build + packaging) ──────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev libnotify-dev \
            libsecret-1-dev \
            fakeroot rpm libfuse2
          sudo gem install fpm --no-document

      # ── App dependencies ─────────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      # ── Tests (gate before building) ─────────────────────────────────────────
      - name: Daemon tests
        working-directory: daemon
        run: go test ./... -timeout 60s

      - name: Flutter tests
        working-directory: flutter_app
        run: flutter test

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build daemon (linux/amd64)
        run: make build-daemon

      - name: Build Flutter app (Linux release)
        working-directory: flutter_app
        run: |
          VERSION="${{ inputs.tag || needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          flutter build linux --release \
            --build-name="$VERSION" \
            --build-number="${GITHUB_RUN_NUMBER}"

      # ── Prepare staging tree ──────────────────────────────────────────────────
      - name: Prepare staging directory
        run: |
          VERSION="${{ inputs.tag || needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          BUNDLE="flutter_app/build/linux/x64/release/bundle"

          if [ ! -d "$BUNDLE" ]; then
            echo "❌ Bundle not found at $BUNDLE"
            exit 1
          fi
          if [ ! -f "daemon/bin/heimdallm" ]; then
            echo "❌ daemon/bin/heimdallm not found"
            exit 1
          fi

          cp "daemon/bin/heimdallm" "$BUNDLE/heimdalld"
          chmod +x "$BUNDLE/heimdallm" "$BUNDLE/heimdalld"

          echo "Bundle contents:"
          ls -lh "$BUNDLE"

          STAGING="staging"
          OPT="$STAGING/opt/heimdallm"
          mkdir -p "$OPT"
          mkdir -p "$STAGING/usr/bin"
          mkdir -p "$STAGING/usr/share/applications"
          mkdir -p dist

          cp -r "$BUNDLE/." "$OPT/"
          chmod +x "$OPT/heimdallm" "$OPT/heimdalld"

          ln -s /opt/heimdallm/heimdallm "$STAGING/usr/bin/heimdallm"

          for SIZE in 48 128 256 512; do
            ICON_DIR="$STAGING/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps"
            mkdir -p "$ICON_DIR"
            cp "flutter_app/assets/icons/${SIZE}.png" "$ICON_DIR/heimdallm.png"
          done

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=Heimdallm' \
            'Comment=AI-powered GitHub PR review agent' \
            'Exec=/opt/heimdallm/heimdallm' \
            'Icon=heimdallm' \
            'Type=Application' \
            'Categories=Development;' \
            'StartupWMClass=com.theburrowhub.heimdallm' \
            'StartupNotify=true' \
            > "$STAGING/usr/share/applications/com.theburrowhub.heimdallm.desktop"

          echo "BUNDLE=$BUNDLE"   >> "$GITHUB_ENV"
          echo "STAGING=$STAGING" >> "$GITHUB_ENV"
          echo "OPT=$OPT"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION"  >> "$GITHUB_ENV"

      # ── .deb (Ubuntu / Debian / Mint / Pop!_OS) ───────────────────────────────
      - name: Build .deb package
        run: |
          fpm \
            -s dir \
            -t deb \
            -n heimdallm \
            -v "$VERSION" \
            --architecture amd64 \
            --description "AI-powered GitHub PR review agent" \
            --url "https://github.com/theburrowhub/heimdallm" \
            --depends "libgtk-3-0" \
            --depends "libayatana-appindicator3-1" \
            --depends "libnotify4" \
            --depends "libsecret-1-0" \
            --package "dist/heimdallm_${VERSION}_amd64.deb" \
            -C "$STAGING" \
            .
          ls -lh "dist/heimdallm_${VERSION}_amd64.deb"
          echo "DEB_PATH=dist/heimdallm_${VERSION}_amd64.deb" >> "$GITHUB_ENV"

      # ── .rpm (Fedora / RHEL / openSUSE) ──────────────────────────────────────
      - name: Build .rpm package
        run: |
          fpm \
            -s dir \
            -t rpm \
            -n heimdallm \
            -v "$VERSION" \
            --architecture x86_64 \
            --description "AI-powered GitHub PR review agent" \
            --url "https://github.com/theburrowhub/heimdallm" \
            --depends "gtk3" \
            --depends "libnotify" \
            --depends "libsecret" \
            --package "dist/heimdallm-${VERSION}-1.x86_64.rpm" \
            -C "$STAGING" \
            .
          ls -lh "dist/heimdallm-${VERSION}-1.x86_64.rpm"
          echo "RPM_PATH=dist/heimdallm-${VERSION}-1.x86_64.rpm" >> "$GITHUB_ENV"

      # ── .AppImage (universal — Arch, NixOS, and any other distro) ────────────
      - name: Build AppImage
        run: |
          APPDIR="AppDir"
          mkdir -p "$APPDIR"

          cp -r "$OPT/." "$APPDIR/"

          printf '%s\n' \
            '#!/bin/bash' \
            'SELF="$(readlink -f "$0")"' \
            'HERE="${SELF%/*}"' \
            'exec "$HERE/heimdallm" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=Heimdallm' \
            'Comment=AI-powered GitHub PR review agent' \
            'Exec=heimdallm' \
            'Icon=heimdallm' \
            'Type=Application' \
            'Categories=Development;' \
            'StartupWMClass=com.theburrowhub.heimdallm' \
            'StartupNotify=true' \
            > "$APPDIR/heimdallm.desktop"

          cp flutter_app/assets/icon.png "$APPDIR/heimdallm.png"

          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            ./appimagetool "$APPDIR" "dist/Heimdallm-${VERSION}-x86_64.AppImage"

          ls -lh "dist/Heimdallm-${VERSION}-x86_64.AppImage"
          echo "APPIMAGE_PATH=dist/Heimdallm-${VERSION}-x86_64.AppImage" >> "$GITHUB_ENV"

      # ── Publish ──────────────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Heimdallm-linux-${{ env.VERSION }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
          files: |
            ${{ env.DEB_PATH }}
            ${{ env.RPM_PATH }}
            ${{ env.APPIMAGE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS .dmg
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: Build Heimdallm.dmg
    needs: release-please
    if: >-
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      # ── Toolchains ──────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: CocoaPods
        working-directory: flutter_app/macos
        run: pod install --repo-update

      # ── Tests (gate before building) ────────────────────────────────────────
      - name: Daemon tests
        working-directory: daemon
        run: go test ./... -timeout 60s

      - name: Flutter tests
        working-directory: flutter_app
        run: flutter test

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build daemon
        run: make build-daemon

      - name: Build Flutter app (release)
        working-directory: flutter_app
        run: |
          VERSION="${{ inputs.tag || needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          flutter build macos --release \
            --build-name="$VERSION" \
            --build-number="${GITHUB_RUN_NUMBER}"

      # ── Bundle ──────────────────────────────────────────────────────────────
      - name: Locate .app and embed daemon
        run: |
          RELEASE_DIR="flutter_app/build/macos/Build/Products/Release"

          APP=$(find "$RELEASE_DIR" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "❌ No .app bundle found in $RELEASE_DIR"
            ls -la "$RELEASE_DIR" || true
            exit 1
          fi
          echo "✓ Found bundle: $APP"

          if [ ! -f "daemon/bin/heimdallm" ]; then
            echo "❌ daemon/bin/heimdallm not found"
            exit 1
          fi

          cp "daemon/bin/heimdallm" "$APP/Contents/MacOS/heimdalld"
          chmod +x "$APP/Contents/MacOS/heimdalld"

          echo "Bundle contents after embedding:"
          ls -lh "$APP/Contents/MacOS/"

          if [ ! -f "$APP/Contents/MacOS/Heimdallm" ]; then
            echo "❌ Flutter binary Heimdallm missing"
            exit 1
          fi
          if [ ! -f "$APP/Contents/MacOS/heimdalld" ]; then
            echo "❌ Daemon binary heimdalld missing"
            exit 1
          fi
          FLUTTER_SIZE=$(stat -f%z "$APP/Contents/MacOS/Heimdallm")
          DAEMON_SIZE=$(stat -f%z "$APP/Contents/MacOS/heimdalld")
          if [ "$FLUTTER_SIZE" -eq "$DAEMON_SIZE" ] && \
             cmp -s "$APP/Contents/MacOS/Heimdallm" "$APP/Contents/MacOS/heimdalld"; then
            echo "❌ Both binaries are identical — case collision detected!"
            exit 1
          fi
          echo "✓ Flutter binary: ${FLUTTER_SIZE} bytes"
          echo "✓ Daemon binary:  ${DAEMON_SIZE} bytes"
          echo "✓ Both binaries embedded and distinct"

          echo "APP=$APP" >> "$GITHUB_ENV"

      - name: Ad-hoc codesign (preserving entitlements)
        run: |
          ENTITLEMENTS="flutter_app/macos/Runner/Release.entitlements"

          echo "Entitlements file:"
          cat "$ENTITLEMENTS"

          find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.framework" \) | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done

          codesign --force --deep \
            --sign - \
            --entitlements "$ENTITLEMENTS" \
            "$APP"

          echo "Signature info:"
          codesign --display --verbose=2 "$APP" 2>&1
          codesign --verify --verbose "$APP"

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP="${APP}"
          VERSION="${{ inputs.tag || needs.release-please.outputs.tag_name }}"
          DMG="dist/Heimdallm-${VERSION}.dmg"
          mkdir -p dist

          CREATE_DMG_ARGS=(
            --volname "Heimdallm ${VERSION}"
            --window-pos 200 120
            --window-size 660 400
            --icon-size 128
            --icon "Heimdallm.app" 165 185
            --hide-extension "Heimdallm.app"
            --app-drop-link 495 185
          )

          if [ -f "assets/dmg-background.png" ]; then
            CREATE_DMG_ARGS+=(--background "assets/dmg-background.png")
          fi

          create-dmg "${CREATE_DMG_ARGS[@]}" "$DMG" "$APP"

          ls -lh "$DMG"
          echo "DMG_PATH=$DMG"   >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # ── Publish ─────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Heimdallm-macos-${{ env.VERSION }}
          path: ${{ env.DMG_PATH }}
          retention-days: 90

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
          files: ${{ env.DMG_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # CLI binaries — cross-platform via GoReleaser
  # ═══════════════════════════════════════════════════════════════════════════
  goreleaser-cli:
    name: Build CLI binaries (GoReleaser)
    needs: release-please
    if: >-
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean ${{ github.event_name == 'workflow_dispatch' && '--skip=homebrew' || '' }}
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
