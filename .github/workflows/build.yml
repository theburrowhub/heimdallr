name: Build & Release

# Only triggered by version tags — never by branch pushes.
# To create a release, use the "Tag release" workflow (tag.yml).
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release build mid-flight

permissions:
  contents: write   # required to create GitHub releases and upload assets

jobs:
  build-linux:
    name: Build Heimdallr Linux packages (.deb / .rpm / .AppImage)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Toolchains ──────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── System dependencies (build + packaging) ──────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev libnotify-dev \
            libsecret-1-dev \
            imagemagick \
            fakeroot rpm libfuse2
          sudo gem install fpm --no-document

      # ── App dependencies ─────────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      # ── Tests (gate before building) ─────────────────────────────────────────
      - name: Daemon tests
        working-directory: daemon
        run: go test ./... -timeout 60s

      - name: Flutter tests
        working-directory: flutter_app
        run: flutter test

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build daemon (linux/amd64)
        run: make build-daemon

      - name: Build Flutter app (Linux release)
        working-directory: flutter_app
        run: |
          flutter build linux --release \
            --build-name="${GITHUB_REF_NAME#v}" \
            --build-number="${GITHUB_RUN_NUMBER}"

      # ── Prepare staging tree ──────────────────────────────────────────────────
      # Creates a directory that mirrors the final installed filesystem layout.
      # All packaging formats are built from this single staging tree.
      - name: Prepare staging directory
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="flutter_app/build/linux/x64/release/bundle"

          if [ ! -d "$BUNDLE" ]; then
            echo "❌ Bundle not found at $BUNDLE"
            exit 1
          fi
          if [ ! -f "daemon/bin/heimdallr" ]; then
            echo "❌ daemon/bin/heimdallr not found"
            exit 1
          fi

          # Embed daemon binary
          cp "daemon/bin/heimdallr" "$BUNDLE/heimdalld"
          chmod +x "$BUNDLE/heimdallr" "$BUNDLE/heimdalld"

          echo "Bundle contents:"
          ls -lh "$BUNDLE"

          # Build staging tree: mirrors installed filesystem
          STAGING="staging"
          OPT="$STAGING/opt/heimdallr"
          mkdir -p "$OPT"
          mkdir -p "$STAGING/usr/bin"
          mkdir -p "$STAGING/usr/share/applications"
          mkdir -p dist

          cp -r "$BUNDLE/." "$OPT/"
          chmod +x "$OPT/heimdallr" "$OPT/heimdalld"

          # /usr/bin/heimdallr → /opt/heimdallr/heimdallr
          ln -s /opt/heimdallr/heimdallr "$STAGING/usr/bin/heimdallr"

          # Icons – install multiple sizes for proper taskbar/dock rendering
          SRC_ICON="flutter_app/assets/icon.png"
          for SIZE in 48 128 256 512; do
            ICON_DIR="$STAGING/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps"
            mkdir -p "$ICON_DIR"
            convert "$SRC_ICON" -resize "${SIZE}x${SIZE}" "$ICON_DIR/heimdallr.png"
          done

          # Desktop entry – filename must match APPLICATION_ID for GNOME taskbar mapping
          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=Heimdallr' \
            'Comment=AI-powered GitHub PR review agent' \
            'Exec=/opt/heimdallr/heimdallr' \
            'Icon=heimdallr' \
            'Type=Application' \
            'Categories=Development;' \
            'StartupWMClass=com.theburrowhub.heimdallr' \
            'StartupNotify=true' \
            > "$STAGING/usr/share/applications/com.theburrowhub.heimdallr.desktop"

          echo "BUNDLE=$BUNDLE"   >> "$GITHUB_ENV"
          echo "STAGING=$STAGING" >> "$GITHUB_ENV"
          echo "OPT=$OPT"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION"  >> "$GITHUB_ENV"

      # ── .deb (Ubuntu / Debian / Mint / Pop!_OS) ───────────────────────────────
      - name: Build .deb package
        run: |
          fpm \
            -s dir \
            -t deb \
            -n heimdallr \
            -v "$VERSION" \
            --architecture amd64 \
            --description "AI-powered GitHub PR review agent" \
            --url "https://github.com/theburrowhub/heimdallr" \
            --depends "libgtk-3-0" \
            --depends "libayatana-appindicator3-1" \
            --depends "libnotify4" \
            --depends "libsecret-1-0" \
            --package "dist/heimdallr_${VERSION}_amd64.deb" \
            -C "$STAGING" \
            .
          ls -lh "dist/heimdallr_${VERSION}_amd64.deb"
          echo "DEB_PATH=dist/heimdallr_${VERSION}_amd64.deb" >> "$GITHUB_ENV"

      # ── .rpm (Fedora / RHEL / openSUSE) ──────────────────────────────────────
      - name: Build .rpm package
        run: |
          fpm \
            -s dir \
            -t rpm \
            -n heimdallr \
            -v "$VERSION" \
            --architecture x86_64 \
            --description "AI-powered GitHub PR review agent" \
            --url "https://github.com/theburrowhub/heimdallr" \
            --depends "gtk3" \
            --depends "libnotify" \
            --depends "libsecret" \
            --package "dist/heimdallr-${VERSION}-1.x86_64.rpm" \
            -C "$STAGING" \
            .
          ls -lh "dist/heimdallr-${VERSION}-1.x86_64.rpm"
          echo "RPM_PATH=dist/heimdallr-${VERSION}-1.x86_64.rpm" >> "$GITHUB_ENV"

      # ── .AppImage (universal — Arch, NixOS, and any other distro) ────────────
      - name: Build AppImage
        run: |
          APPDIR="AppDir"
          mkdir -p "$APPDIR"

          # Copy bundle into AppDir root
          cp -r "$OPT/." "$APPDIR/"

          # AppRun — must be executable; finds resources relative to itself
          printf '%s\n' \
            '#!/bin/bash' \
            'SELF="$(readlink -f "$0")"' \
            'HERE="${SELF%/*}"' \
            'exec "$HERE/heimdallr" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Desktop entry (AppImage spec: Exec= is just the binary name)
          # Note: AppImage .desktop filename must match the icon basename, so we
          # keep 'heimdallr.desktop' here (not the reverse-DNS used for system installs).
          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=Heimdallr' \
            'Comment=AI-powered GitHub PR review agent' \
            'Exec=heimdallr' \
            'Icon=heimdallr' \
            'Type=Application' \
            'Categories=Development;' \
            'StartupWMClass=com.theburrowhub.heimdallr' \
            'StartupNotify=true' \
            > "$APPDIR/heimdallr.desktop"

          # Icon named after the desktop file (required by AppImage spec)
          cp flutter_app/assets/icon.png "$APPDIR/heimdallr.png"

          # Download appimagetool
          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          # Build (APPIMAGE_EXTRACT_AND_RUN=1 avoids FUSE requirement in CI)
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            ./appimagetool "$APPDIR" "dist/Heimdallr-${VERSION}-x86_64.AppImage"

          ls -lh "dist/Heimdallr-${VERSION}-x86_64.AppImage"
          echo "APPIMAGE_PATH=dist/Heimdallr-${VERSION}-x86_64.AppImage" >> "$GITHUB_ENV"

      # ── Publish ──────────────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Heimdallr-linux-${{ env.VERSION }}
          path: dist/
          retention-days: 90

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Heimdallr v${{ env.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false   # macOS job owns the release notes
          files: |
            ${{ env.DEB_PATH }}
            ${{ env.RPM_PATH }}
            ${{ env.APPIMAGE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Heimdallr.dmg
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      # ── Toolchains ──────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: CocoaPods
        working-directory: flutter_app/macos
        run: pod install --repo-update

      # ── Tests (gate before building) ────────────────────────────────────────
      - name: Daemon tests
        working-directory: daemon
        run: go test ./... -timeout 60s

      - name: Flutter tests
        working-directory: flutter_app
        run: flutter test

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build daemon
        run: make build-daemon

      - name: Build Flutter app (release)
        working-directory: flutter_app
        run: flutter build macos --release --build-name="${GITHUB_REF_NAME#v}" --build-number="${GITHUB_RUN_NUMBER}"

      # ── Bundle ──────────────────────────────────────────────────────────────
      - name: Locate .app and embed daemon
        run: |
          RELEASE_DIR="flutter_app/build/macos/Build/Products/Release"

          # Find the .app bundle — name can vary with Xcode settings
          APP=$(find "$RELEASE_DIR" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "❌ No .app bundle found in $RELEASE_DIR"
            ls -la "$RELEASE_DIR" || true
            exit 1
          fi
          echo "✓ Found bundle: $APP"

          # Verify daemon binary was compiled
          if [ ! -f "daemon/bin/heimdallr" ]; then
            echo "❌ daemon/bin/heimdallr not found"
            exit 1
          fi

          # Embed daemon as 'heimdalld' — MUST differ from Flutter's 'Heimdallr'
          # because macOS APFS is case-insensitive: heimdallr == Heimdallr,
          # which would silently overwrite the Flutter binary with the daemon.
          cp "daemon/bin/heimdallr" "$APP/Contents/MacOS/heimdalld"
          chmod +x "$APP/Contents/MacOS/heimdalld"

          echo "Bundle contents after embedding:"
          ls -lh "$APP/Contents/MacOS/"

          # Verify both binaries are present and distinct
          if [ ! -f "$APP/Contents/MacOS/Heimdallr" ]; then
            echo "❌ Flutter binary Heimdallr missing"
            exit 1
          fi
          if [ ! -f "$APP/Contents/MacOS/heimdalld" ]; then
            echo "❌ Daemon binary heimdalld missing"
            exit 1
          fi
          FLUTTER_SIZE=$(stat -f%z "$APP/Contents/MacOS/Heimdallr")
          DAEMON_SIZE=$(stat -f%z "$APP/Contents/MacOS/heimdalld")
          if [ "$FLUTTER_SIZE" -eq "$DAEMON_SIZE" ] && \
             cmp -s "$APP/Contents/MacOS/Heimdallr" "$APP/Contents/MacOS/heimdalld"; then
            echo "❌ Both binaries are identical — case collision detected!"
            exit 1
          fi
          echo "✓ Flutter binary: ${FLUTTER_SIZE} bytes"
          echo "✓ Daemon binary:  ${DAEMON_SIZE} bytes"
          echo "✓ Both binaries embedded and distinct"

          echo "APP=$APP" >> "$GITHUB_ENV"

      - name: Ad-hoc codesign (preserving entitlements)
        run: |
          ENTITLEMENTS="flutter_app/macos/Runner/Release.entitlements"

          echo "Entitlements file:"
          cat "$ENTITLEMENTS"

          # Sign each nested binary first, then the bundle.
          # --entitlements ensures app-sandbox=false and network.client are preserved.
          # Without this, macOS sandbox blocks all network calls and the app crashes on launch.
          find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.framework" \) | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done

          codesign --force --deep \
            --sign - \
            --entitlements "$ENTITLEMENTS" \
            "$APP"

          echo "Signature info:"
          codesign --display --verbose=2 "$APP" 2>&1
          codesign --verify --verbose "$APP"

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP="${APP}"
          VERSION="${GITHUB_REF_NAME}"
          DMG="dist/Heimdallr-${VERSION}.dmg"
          mkdir -p dist

          CREATE_DMG_ARGS=(
            --volname "Heimdallr ${VERSION}"
            --window-pos 200 120
            --window-size 660 400
            --icon-size 128
            --icon "Heimdallr.app" 165 185
            --hide-extension "Heimdallr.app"
            --app-drop-link 495 185
          )

          # Use custom background if it exists in the repo
          if [ -f "assets/dmg-background.png" ]; then
            CREATE_DMG_ARGS+=(--background "assets/dmg-background.png")
          fi

          create-dmg "${CREATE_DMG_ARGS[@]}" "$DMG" "$APP"

          ls -lh "$DMG"
          echo "DMG_PATH=$DMG"   >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # ── Publish ─────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Heimdallr-${{ env.VERSION }}
          path: ${{ env.DMG_PATH }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Heimdallr ${{ env.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ env.DMG_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
